services:
  postgres:
    image: postgres:16
    container_name: saas-core-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saas_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas-core-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
